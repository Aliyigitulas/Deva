<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Tasarım Aşamasında</title>
    <style>
        /* Sayfa genel ayarları */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* İstediğin pembe tonu (Hot Pink veya daha soft bir ton için kodu değiştirebilirsin) */
            background-color: #ffc0cb; 
        }

        /* Metin kutusu ayarları */
        .container {
            text-align: center;
            color: #333;
            padding: 20px;
        }

        /* Ana başlık */
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Alt isim */
        p {
            font-size: 1.5rem;
            font-weight: 300;
            color: #555;
            border-top: 2px solid #555;
            display: inline-block;
            padding-top: 10px;
        }

        /* Küçük bir animasyon: Sayfa açıldığında hafifçe belirsin */
        .fade-in {
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container fade-in">
        <h1>Site Tasarım Aşamasında</h1>
        <p>Ali Yiğit Ulaş</p>
    </div>

</body>
</html>
